version: 0.0
os: linux

files:
  - source: Java-Login-App/target/dptweb-1.0-SNAPSHOT.war
    destination: /usr/share/tomcat/webapps

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 300
      runas: root